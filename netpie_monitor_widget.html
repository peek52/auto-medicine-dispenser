<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", Tahoma, sans-serif; color: #0b1220; padding: 12px; min-height: 100vh; background: linear-gradient(135deg, #f4f8ff, #e7f0ff); }
    .wrap { max-width: 880px; margin: 0 auto; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 12px 28px rgba(15,23,42,.1); overflow: hidden; }
    .hd { padding: 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(11,18,32,.08); background: rgba(56,189,248,.08); position: relative; }
    .hd:before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #1d4ed8, #38bdf8); }
    .hdI { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; font-size: 20px; background: #fff; border: 1px solid rgba(11,18,32,.06); }
    .hdT b { font-size: 17px; font-weight: 900; display: block; }
    .hdT span { font-size: 12px; color: #5b6b82; font-weight: 700; }
    .ct { padding: 14px; }
    .hr { display: grid; grid-template-columns: 1.3fr .95fr; gap: 12px; margin-bottom: 12px; }
    .hp { background: #f8fafc; border: 1px solid rgba(11,18,32,.06); border-radius: 16px; padding: 14px; }
    .hp h3 { font-size: 12px; color: #5b6b82; font-weight: 900; margin-bottom: 6px; }
    .bt { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 6px; }
    .bt b { font-size: 50px; line-height: .9; font-weight: 900; letter-spacing: -2px; color: #1d4ed8; }
    .bt span { font-size: 14px; font-weight: 900; color: #5b6b82; margin-bottom: 6px; }
    .hp p { font-size: 12px; color: #5b6b82; font-weight: 700; line-height: 1.4; }
    .sg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sb { background: #fff; border: 1px solid rgba(11,18,32,.06); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 3px; min-height: 88px; }
    .sb .l { font-size: 10px; font-weight: 900; color: #5b6b82; }
    .sb .v { font-size: 32px; line-height: 1; font-weight: 900; }
    .sb .s { font-size: 11px; color: #5b6b82; font-weight: 800; }
    .mg { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
    .mc { position: relative; background: #fff; border: 1px solid rgba(11,18,32,.08); border-radius: 16px; padding: 14px; overflow: hidden; }
    .mc:before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--a, #1d4ed8); }
    .mc.ok { --a: #10b981; }
    .mc.wn { --a: #f59e0b; }
    .mc.bd { --a: #ef4444; }
    .mt { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .mi { font-size: 11px; font-weight: 900; color: #0b4aa8; margin-bottom: 3px; }
    .mn { font-size: 18px; font-weight: 900; word-break: break-word; }
    .ms { padding: 6px 9px; border-radius: 999px; font-size: 10px; font-weight: 900; white-space: nowrap; background: #fff; color: #5b6b82; border: 1px solid rgba(11,18,32,.08); }
    .ok .ms { color: #0f5132; background: #dcfce7; }
    .wn .ms { color: #9a6700; background: #fef3c7; }
    .bd .ms { color: #7f1d1d; background: #fee2e2; }
    .sr { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 10px; background: #f8fafc; border: 1px solid rgba(11,18,32,.06); border-radius: 12px; }
    .sl { font-size: 11px; font-weight: 900; color: #5b6b82; }
    .sp { padding: 5px 11px; border-radius: 999px; font-size: 11px; font-weight: 900; display: inline-flex; align-items: center; gap: 5px; border: 1px solid transparent; }
    .sp .d { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
    .sp.has { color: #047857; background: #dcfce7; border-color: #bbf7d0; }
    .sp.mid { color: #b45309; background: #fef3c7; border-color: #fde68a; }
    .sp.em { color: #b91c1c; background: #fee2e2; border-color: #fecaca; }
    .sp.na { color: #475569; background: #f1f5f9; border-color: #cbd5e1; }
    .cr { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 8px; }
    .cn { font-size: 46px; line-height: .9; font-weight: 900; letter-spacing: -2px; }
    .cm { font-size: 13px; font-weight: 900; color: #5b6b82; margin-bottom: 6px; }
    .ok .cn { color: #10b981; }
    .wn .cn { color: #f59e0b; }
    .bd .cn { color: #ef4444; }
    .pr { height: 9px; border-radius: 999px; background: #e2e8f0; overflow: hidden; margin-bottom: 10px; }
    .pf { height: 100%; border-radius: 999px; background: #1d4ed8; }
    .ok .pf { background: #10b981; }
    .wn .pf { background: #f59e0b; }
    .bd .pf { background: #ef4444; }
    .ll { font-size: 10px; font-weight: 900; color: #5b6b82; margin-bottom: 6px; }
    .sw { display: flex; flex-wrap: wrap; gap: 6px; }
    .tg { padding: 6px 9px; border-radius: 999px; background: #dbeafe; border: 1px solid #bfdbfe; color: #24416a; font-size: 10px; font-weight: 900; }
    .tg.no { background: transparent; border-color: #e2e8f0; color: #94a3b8; }
    @media(max-width:760px) { .hr { grid-template-columns: 1fr; } .mg { grid-template-columns: 1fr; } }
    @media(max-width:420px) { .sg { grid-template-columns: 1fr; } .bt b { font-size: 40px; } .cn { font-size: 38px; } }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="hd">
        <div class="hdI">💊</div>
        <div class="hdT">
          <b>มอนิเตอร์สถานะตลับยา</b>
          <span>ดูจำนวนยาคงเหลือพร้อมแจ้งเตือนยาใกล้หมด</span>
        </div>
      </div>
      <div class="ct">
        <div id="mc" class="mg"></div>
      </div>
    </div>
  </div>

  <script>
    window._s = window._s || {};
    window._s.m1n = "${#["esp32cam_dispenser"]["shadow"]["med1_name"]}";
    window._s.m1c = "${#["esp32cam_dispenser"]["shadow"]["med1_count"]}";
    window._s.m1s = "${#["esp32cam_dispenser"]["shadow"]["med1_slots"]}";
    window._s.m1p = "${#["esp32cam_dispenser"]["shadow"]["med1_pills"]}";
  </script>
  <script>
    window._s = window._s || {};
    window._s.m2n = "${#["esp32cam_dispenser"]["shadow"]["med2_name"]}";
    window._s.m2c = "${#["esp32cam_dispenser"]["shadow"]["med2_count"]}";
    window._s.m2s = "${#["esp32cam_dispenser"]["shadow"]["med2_slots"]}";
    window._s.m2p = "${#["esp32cam_dispenser"]["shadow"]["med2_pills"]}";
  </script>
  <script>
    window._s = window._s || {};
    window._s.m3n = "${#["esp32cam_dispenser"]["shadow"]["med3_name"]}";
    window._s.m3c = "${#["esp32cam_dispenser"]["shadow"]["med3_count"]}";
    window._s.m3s = "${#["esp32cam_dispenser"]["shadow"]["med3_slots"]}";
    window._s.m3p = "${#["esp32cam_dispenser"]["shadow"]["med3_pills"]}";
  </script>
  <script>
    window._s = window._s || {};
    window._s.m4n = "${#["esp32cam_dispenser"]["shadow"]["med4_name"]}";
    window._s.m4c = "${#["esp32cam_dispenser"]["shadow"]["med4_count"]}";
    window._s.m4s = "${#["esp32cam_dispenser"]["shadow"]["med4_slots"]}";
    window._s.m4p = "${#["esp32cam_dispenser"]["shadow"]["med4_pills"]}";
  </script>
  <script>
    window._s = window._s || {};
    window._s.m5n = "${#["esp32cam_dispenser"]["shadow"]["med5_name"]}";
    window._s.m5c = "${#["esp32cam_dispenser"]["shadow"]["med5_count"]}";
    window._s.m5s = "${#["esp32cam_dispenser"]["shadow"]["med5_slots"]}";
    window._s.m5p = "${#["esp32cam_dispenser"]["shadow"]["med5_pills"]}";
  </script>
  <script>
    window._s = window._s || {};
    window._s.m6n = "${#["esp32cam_dispenser"]["shadow"]["med6_name"]}";
    window._s.m6c = "${#["esp32cam_dispenser"]["shadow"]["med6_count"]}";
    window._s.m6s = "${#["esp32cam_dispenser"]["shadow"]["med6_slots"]}";
    window._s.m6p = "${#["esp32cam_dispenser"]["shadow"]["med6_pills"]}";
  </script>

  <script>
    var SL = ["เช้า-ก่อน","เช้า-หลัง","เที่ยง-ก่อน","เที่ยง-หลัง","เย็น-ก่อน","เย็น-หลัง","ก่อนนอน"];
    var LO = 3, MX = 16;
    var sh = window._s || {};

    function R(v) {
      if (v == null) return "";
      v = String(v);
      if (v === "null" || v === "undefined") return "";
      return v;
    }
    function I(v) { var n = parseInt(R(v), 10); return isNaN(n) ? 0 : n; }
    function CL(v, a, b) { var n = I(v); return Math.max(a, Math.min(b, n)); }
    function MI(v) { var s = R(v); if (s === "") return null; var n = parseInt(s, 10); return (isNaN(n) || n < 0) ? null : n; }
    function E(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
    function ST(c) { if (c <= 0) return { k: "bd", l: "ยาหมด" }; if (c <= LO) return { k: "wn", l: "ใกล้หมด" }; return { k: "ok", l: "พร้อมจ่าย" }; }
    /* 3-tier sensor status from VL53 pill count:
       0      → ยาหมด (red)
       1-7    → ปานกลาง (yellow)
       8-15   → มียา (green)
       null   → ไม่พบเซ็นเซอร์ (gray) */
    function SP(s) {
      if (s === "has") return { c: "has", l: "มียา" };
      if (s === "mid") return { c: "mid", l: "ปานกลาง" };
      if (s === "em")  return { c: "em",  l: "ยาหมด" };
      return                  { c: "na",  l: "ไม่พบเซ็นเซอร์" };
    }
    function pillsToTier(vp) {
      if (vp === null) return "na";
      if (vp === 0)    return "em";
      if (vp <= 7)     return "mid";
      return                "has";
    }

    var H = "", T = 0, Re = 0, L = 0;
    for (var i = 1; i <= 6; i++) {
      var nm = R(sh["m" + i + "n"]);
      var cn = CL(sh["m" + i + "c"], 0, MX);
      var sl = I(sh["m" + i + "s"]);
      var vp = MI(sh["m" + i + "p"]);
      var ss = pillsToTier(vp);
      var st = ST(cn), sp = SP(ss);
      var pc = Math.min(100, Math.round(cn / MX * 100));
      T += cn;
      if (cn > 0) Re++;
      if (cn > 0 && cn <= LO) L++;
      H += '<div class="mc ' + st.k + '">';
      H += '<div class="mt"><div><div class="mi">ตลับที่ ' + i + '</div><div class="mn">' + (E(nm) || "— ยังไม่ได้ตั้งชื่อยา —") + '</div></div><div class="ms">' + st.l + '</div></div>';
      H += '<div class="cr"><div class="cn">' + cn + '</div><div class="cm">/ ' + MX + ' เม็ด</div></div>';
      H += '<div class="pr"><div class="pf" style="width:' + pc + '%"></div></div>';
      H += '<div class="ll">รอบที่ต้องจ่ายยา</div><div class="sw">';
      var hs = false;
      for (var j = 0; j < 7; j++) if (sl & (1 << j)) { H += '<div class="tg">' + SL[j] + '</div>'; hs = true; }
      if (!hs) H += '<div class="tg no">ไม่มีรอบจ่าย</div>';
      H += '</div></div>';
    }
    document.getElementById("mc").innerHTML = H;
  </script>
</body>
</html>
