<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>ตารางจ่ายยาวันนี้</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f8fafc;
      --bg-2: #eef2ff;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --surface-warm: #fefce8;
      --surface-cool: #f0f9ff;

      --ink: #0f172a;
      --ink-2: #334155;
      --muted: #64748b;
      --muted-2: #94a3b8;

      --line: #e2e8f0;
      --line-2: #f1f5f9;

      --pri: #2563eb;
      --pri-soft: #dbeafe;
      --pri-ink: #1e40af;

      --ok: #16a34a;
      --ok-soft: #dcfce7;
      --warn: #d97706;
      --warn-soft: #fef3c7;
      --bad: #dc2626;
      --bad-soft: #fee2e2;

      --accent-morn-1: #f59e0b;
      --accent-morn-2: #fb923c;
      --accent-noon-1: #0ea5e9;
      --accent-noon-2: #2563eb;
      --accent-eve-1:  #8b5cf6;
      --accent-eve-2:  #6366f1;
      --accent-bed-1:  #0f766e;
      --accent-bed-2:  #14b8a6;

      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 26px;

      --shadow-1: 0 1px 2px rgba(15,23,42,.04), 0 1px 1px rgba(15,23,42,.03);
      --shadow-2: 0 4px 12px rgba(15,23,42,.06), 0 2px 4px rgba(15,23,42,.04);
      --shadow-3: 0 12px 28px rgba(15,23,42,.10), 0 4px 8px rgba(15,23,42,.05);
      --shadow-pri: 0 14px 32px rgba(37,99,235,.28);

      --max: 760px;
      --ease: cubic-bezier(.4,0,.2,1);

      --fs-xs: 12px;
      --fs-sm: 13px;
      --fs-base: 15px;
      --fs-md: 16px;
      --fs-lg: 18px;
      --fs-xl: 22px;
      --fs-2xl: 28px;
      --fs-clock: 44px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      font-family: 'IBM Plex Sans Thai', 'Inter', 'Segoe UI', sans-serif;
      color: var(--ink);
      padding: 24px 16px 32px;
      min-height: 100vh;
      font-size: var(--fs-base);
      line-height: 1.5;
      background:
        radial-gradient(1200px 600px at 8% -8%, rgba(37,99,235,.10), transparent 55%),
        radial-gradient(900px 480px at 95% 0%, rgba(14,165,233,.10), transparent 50%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      letter-spacing: 0;
    }

    .wrap { max-width: var(--max); margin: 0 auto; width: 100%; }

    /* ===== Hero "วันนี้" header ===== */
    .hero {
      background: var(--surface);
      border-radius: var(--r-xl);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-2);
      padding: 22px 24px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
    }
    .hero-ico {
      width: 56px; height: 56px;
      border-radius: 18px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--pri) 0%, #38bdf8 100%);
      color: #fff;
      font-size: 28px;
      box-shadow: var(--shadow-pri);
    }
    .hero-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .hero-title {
      font-size: var(--fs-xl);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -.02em;
      line-height: 1.1;
    }
    .hero-date {
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--muted);
    }
    .hero-clock {
      font-family: 'Inter', sans-serif;
      font-size: var(--fs-clock);
      font-weight: 800;
      color: var(--pri-ink);
      letter-spacing: -.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .hero-clock-sub {
      font-size: var(--fs-xs);
      font-weight: 700;
      color: var(--muted-2);
      text-align: right;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-top: 4px;
    }

    /* ===== Stats strip ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 13px 16px;
      box-shadow: var(--shadow-1);
    }
    .stat .l {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }
    .stat .v {
      font-size: var(--fs-xl);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -.02em;
      line-height: 1;
    }
    .stat .v .u {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--muted);
      margin-left: 4px;
    }
    .stat.ok  .v { color: var(--ok); }
    .stat.warn .v { color: var(--warn); }
    .stat.bad .v { color: var(--bad); }

    /* ===== Schedule-off banner ===== */
    .off-banner {
      background: var(--warn-soft);
      border: 1px solid #fde68a;
      border-radius: var(--r-lg);
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .off-banner-ico { font-size: 22px; }
    .off-banner-text { font-size: var(--fs-sm); font-weight: 700; color: #92400e; }

    /* ===== Dose list ===== */
    .empty {
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--r-xl);
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }
    .empty .ico { font-size: 48px; margin-bottom: 14px; }
    .empty .ti { font-size: var(--fs-md); font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .empty .su { font-size: var(--fs-sm); color: var(--muted); }

    .dose-list { display: flex; flex-direction: column; gap: 12px; }

    .dose {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      padding: 18px 20px 18px 24px;
      box-shadow: var(--shadow-2);
      transition: transform .15s var(--ease), box-shadow .15s var(--ease), border-color .15s var(--ease);
      overflow: hidden;
    }
    .dose:before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: var(--accent, linear-gradient(180deg, var(--pri) 0%, #38bdf8 100%));
    }
    .dose:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-3);
    }

    .dose.morning  { --accent: linear-gradient(180deg, var(--accent-morn-1) 0%, var(--accent-morn-2) 100%); }
    .dose.noon     { --accent: linear-gradient(180deg, var(--accent-noon-1) 0%, var(--accent-noon-2) 100%); }
    .dose.evening  { --accent: linear-gradient(180deg, var(--accent-eve-1)  0%, var(--accent-eve-2)  100%); }
    .dose.bed      { --accent: linear-gradient(180deg, var(--accent-bed-1)  0%, var(--accent-bed-2)  100%); }

    .dose.past {
      opacity: .65;
      background: var(--surface-alt);
    }
    .dose.now {
      border-color: var(--pri);
      box-shadow: 0 0 0 3px rgba(37,99,235,.16), var(--shadow-3);
      background: var(--surface-cool);
    }
    .dose.now:before { width: 8px; }

    .dose-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .dose-time-col { display: flex; flex-direction: column; min-width: 92px; }
    .dose-time {
      font-family: 'Inter', sans-serif;
      font-size: var(--fs-2xl);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .dose.past .dose-time { color: var(--muted); }
    .dose.now .dose-time { color: var(--pri-ink); }

    .dose-slot {
      margin-top: 6px;
      font-size: var(--fs-xs);
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      display: flex; align-items: center; gap: 6px;
    }
    .dose-slot .em { font-size: 14px; }

    .dose-meds-col { min-width: 0; }
    .dose-meds-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 7px;
    }
    .dose-meds {
      display: flex; flex-wrap: wrap; gap: 7px;
    }
    .med-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--surface-alt);
      border: 1px solid var(--line-2);
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--ink-2);
    }
    .med-pill .dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--mc, var(--pri));
    }
    .dose.past .med-pill { opacity: .8; }

    .dose-status-col { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .dose-badge {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: 800;
      letter-spacing: .03em;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .dose-badge.past { background: var(--surface-alt); color: var(--muted); border: 1px solid var(--line-2); }
    .dose-badge.now {
      background: var(--pri); color: #fff;
      box-shadow: 0 6px 14px rgba(37,99,235,.36);
    }
    .dose-badge.now .pulse {
      width: 8px; height: 8px; border-radius: 999px;
      background: #fff;
      animation: blink 1.4s ease-in-out infinite;
    }
    .dose-badge.upcoming { background: var(--pri-soft); color: var(--pri-ink); }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .dose-tta {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    /* ===== Footer ===== */
    .foot {
      margin-top: 18px;
      text-align: center;
      font-size: var(--fs-xs);
      color: var(--muted-2);
      font-weight: 500;
    }

    /* ===== Responsive ===== */
    @media (max-width: 720px) {
      :root {
        --fs-xs: 13px;
        --fs-sm: 14px;
        --fs-base: 16px;
        --fs-md: 17px;
        --fs-lg: 19px;
        --fs-xl: 23px;
        --fs-2xl: 26px;
        --fs-clock: 38px;
      }
      body { padding: 18px 14px 28px; }
      .hero { grid-template-columns: auto 1fr; padding: 18px 18px; gap: 14px; }
      .hero-clock { font-size: var(--fs-clock); grid-column: 1 / -1; text-align: center; }
      .hero-clock-sub { text-align: center; }
    }
    @media (max-width: 540px) {
      :root {
        --fs-2xl: 28px;
        --fs-clock: 36px;
      }
      .hero { padding: 16px; gap: 12px; }
      .hero-ico { width: 50px; height: 50px; font-size: 24px; border-radius: 16px; }
      .hero-title { font-size: 20px; }
      .stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      .stat { padding: 11px 12px; }
      .stat .v { font-size: 20px; }
      .dose { padding: 16px 16px 16px 22px; }
      .dose-row {
        grid-template-columns: auto 1fr;
        gap: 14px;
      }
      .dose-status-col {
        grid-column: 1 / -1;
        align-items: flex-start;
        margin-top: 4px;
        flex-direction: row;
        justify-content: space-between;
        width: 100%;
      }
      .dose-time { font-size: 26px; }
      .med-pill { padding: 6px 11px; font-size: 13px; }
    }
    @media (max-width: 380px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat:nth-child(3) { grid-column: 1 / -1; }
      .dose-time-col { min-width: 78px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- HERO -->
    <div class="hero">
      <div class="hero-ico">📅</div>
      <div class="hero-meta">
        <div class="hero-title">ตารางจ่ายยาวันนี้</div>

      </div>
      <div>
        <div class="hero-clock" id="hero-clock">--:--</div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">

      <div class="stat warn">

    <!-- DISABLED banner -->
    <div class="off-banner" id="off-banner" style="display:none">
      <div class="off-banner-ico">⏸️</div>
      <div class="off-banner-text">
        ระบบจ่ายยาอัตโนมัติถูกปิดอยู่ &middot; แม้ถึงเวลาก็จะไม่จ่ายยาให้
      </div>
    </div>

    <!-- DOSE LIST -->
    <div id="dose-container"></div>

    <div class="foot">อัปเดตอัตโนมัติทุก 30 วินาที</div>
  </div>

  <!-- ============================================================ -->
  <!-- SCRIPT 2: Render today's schedule                            -->
  <!-- ============================================================ -->
  <script>
    var SLOT_DEFS = [
      { idx: 0, key: 't_morn_pre',  label: 'มื้อเช้า · ก่อนอาหาร',    ico: '🌅', meal: 'morning' },
      { idx: 1, key: 't_morn_post', label: 'มื้อเช้า · หลังอาหาร',    ico: '🌅', meal: 'morning' },
      { idx: 2, key: 't_noon_pre',  label: 'มื้อกลางวัน · ก่อนอาหาร', ico: '☀️', meal: 'noon' },
      { idx: 3, key: 't_noon_post', label: 'มื้อกลางวัน · หลังอาหาร', ico: '☀️', meal: 'noon' },
      { idx: 4, key: 't_eve_pre',   label: 'มื้อเย็น · ก่อนอาหาร',    ico: '🌆', meal: 'evening' },
      { idx: 5, key: 't_eve_post',  label: 'มื้อเย็น · หลังอาหาร',    ico: '🌆', meal: 'evening' },
      { idx: 6, key: 't_bed',       label: 'ก่อนนอน',                 ico: '🌙', meal: 'bed' }
    ];

    /* "Now" window: ±15 minutes around the slot time = currently due. */
    var NOW_WINDOW_MIN = 15;
    /* After this many minutes past, the dose drops to "past". */
    var PAST_GRACE_MIN = 60;

    /* Per-module colors so the same med looks consistent across widgets. */
    var MED_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9'];

    function safeStr(v) {
      if (v == null) return '';
      v = String(v);
      if (v === 'null' || v === 'undefined') return '';
      return v;
    }
    function safeInt(v) { var n = parseInt(safeStr(v), 10); return isNaN(n) ? 0 : n; }
    function escapeHtml(v) {
      return safeStr(v)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function pad2(n) { return (n < 10 ? '0' : '') + n; }
    function parseHHMM(s) {
      s = safeStr(s);
      if (!s || s.indexOf(':') === -1) return null;
      var p = s.split(':');
      var h = parseInt(p[0], 10), m = parseInt(p[1], 10);
      if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) return null;
      return h * 60 + m;
    }

    var TH_DAYS   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    var TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    function thaiDate(d) {
      return 'วัน' + TH_DAYS[d.getDay()] + ' ที่ ' + d.getDate() + ' ' + TH_MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543);
    }

    function tickClock() {
      var now = new Date();
      var hc = document.getElementById('hero-clock');
      var hd = document.getElementById('hero-date');
      if (hc) hc.textContent = pad2(now.getHours()) + ':' + pad2(now.getMinutes());
      if (hd) hd.textContent = thaiDate(now);
    }

    function getMeds() {
      var sh = window._sh || {};
      var out = [];
      for (var i = 1; i <= 6; i++) {
        out.push({
          id: i,
          name:  safeStr(sh['med' + i + '_name']),
          count: safeInt(sh['med' + i + '_count']),
          slots: safeInt(sh['med' + i + '_slots']) & 0x7F,
          color: MED_COLORS[i - 1]
        });
      }
      return out;
    }

    function medsForSlot(meds, slotIdx) {
      var bit = 1 << slotIdx;
      var hit = [];
      for (var i = 0; i < meds.length; i++) {
        if (meds[i].slots & bit) hit.push(meds[i]);
      }
      return hit;
    }

    function formatTTA(slotMin, nowMin) {
      var diff = slotMin - nowMin;
      if (diff < 0) {
        var ago = -diff;
        if (ago < 60) return 'ผ่านมา ' + ago + ' นาที';
        return 'ผ่านมา ' + Math.floor(ago / 60) + ' ชม. ' + (ago % 60) + ' นาที';
      }
      if (diff === 0) return 'ถึงเวลาตอนนี้';
      if (diff < 60) return 'อีก ' + diff + ' นาที';
      return 'อีก ' + Math.floor(diff / 60) + ' ชม. ' + (diff % 60) + ' นาที';
    }

    function render() {
      var sh = window._sh || {};
      var enabled = safeInt(sh.scheduleEnabled) === 1;

      var off = document.getElementById('off-banner');
      if (off) off.style.display = enabled ? 'none' : 'flex';

      var meds = getMeds();
      var now = new Date();
      var nowMin = now.getHours() * 60 + now.getMinutes();

      /* Build doses: keep only slots that have BOTH a valid time AND at
       * least one med assigned. A slot with a time but no meds isn't a
       * dose, and a slot with meds but no time can't be scheduled. */
      var doses = [];
      for (var s = 0; s < SLOT_DEFS.length; s++) {
        var def = SLOT_DEFS[s];
        var t = parseHHMM(sh[def.key]);
        if (t == null) continue;
        var sm = medsForSlot(meds, def.idx);
        if (sm.length === 0) continue;
        doses.push({ def: def, time: t, meds: sm });
      }
      doses.sort(function(a, b) { return a.time - b.time; });

      var past = 0, left = 0;
      for (var i = 0; i < doses.length; i++) {
        if (doses[i].time + PAST_GRACE_MIN <= nowMin) past++;
        else left++;
      }

      document.getElementById('s-total').innerHTML = doses.length + '<span class="u">มื้อ</span>';
      document.getElementById('s-past').innerHTML  = past + '<span class="u">มื้อ</span>';
      document.getElementById('s-left').innerHTML  = left + '<span class="u">มื้อ</span>';

      var cont = document.getElementById('dose-container');
      if (!cont) return;

      if (doses.length === 0) {
        cont.innerHTML =
          '<div class="empty">' +
          '<div class="ico">📭</div>' +
          '<div class="ti">ยังไม่มีตารางจ่ายยา</div>' +
          '<div class="su">เพิ่มยาและเลือกช่วงเวลาที่หน้าตั้งค่า NETPIE</div>' +
          '</div>';
        return;
      }

      var html = '<div class="dose-list">';
      for (var k = 0; k < doses.length; k++) {
        var d = doses[k];
        var t = d.time;
        var hh = Math.floor(t / 60), mm = t % 60;

        /* Status: past / now (within ±15 min) / upcoming / recently passed. */
        var cls = '', badge = '', badgeText = '';
        var diff = t - nowMin;
        if (diff < -PAST_GRACE_MIN) {
          cls = 'past';
          badge = 'past';
          badgeText = 'ผ่านแล้ว';
        } else if (Math.abs(diff) <= NOW_WINDOW_MIN) {
          cls = 'now';
          badge = 'now';
          badgeText = '<span class="pulse"></span>ถึงเวลา';
        } else if (diff > 0) {
          badge = 'upcoming';
          badgeText = 'รอ';
        } else {
          badge = 'past';
          badgeText = 'เลยเวลา';
        }

        html += '<div class="dose ' + d.def.meal + ' ' + cls + '">';
        html += '  <div class="dose-row">';

        /* Time + slot */
        html += '    <div class="dose-time-col">';
        html += '      <div class="dose-time">' + pad2(hh) + ':' + pad2(mm) + '</div>';
        html += '      <div class="dose-slot"><span class="em">' + d.def.ico + '</span>' + d.def.label + '</div>';
        html += '    </div>';

        /* Med pills */
        html += '    <div class="dose-meds-col">';
        html += '      <div class="dose-meds-label">ยาที่ต้องรับ (' + d.meds.length + ' ตัว)</div>';
        html += '      <div class="dose-meds">';
        for (var mi = 0; mi < d.meds.length; mi++) {
          var med = d.meds[mi];
          var nm = med.name || ('โมดูล ' + med.id);
          /* Just the name — count / empty state intentionally NOT shown
           * (user 2026-05-15: "ลบออกให้หมด"). Today-schedule widget is
           * for WHAT to take WHEN. Remaining-stock view belongs on the
           * dashboard widget. */
          html += '<div class="med-pill" style="--mc:' + med.color + '">';
          html += '<span class="dot"></span>';
          html += escapeHtml(nm);
          html += '</div>';
        }
        html += '      </div>';
        html += '    </div>';

        /* Status badge + time-to-arrive */
        html += '    <div class="dose-status-col">';
        html += '      <div class="dose-badge ' + badge + '">' + badgeText + '</div>';
        html += '      <div class="dose-tta">' + formatTTA(t, nowMin) + '</div>';
        html += '    </div>';

        html += '  </div>';
        html += '</div>';
      }
      html += '</div>';
      cont.innerHTML = html;
    }

    /* Hero clock ticks every second; the heavy dose re-render runs every
     * 30 s — dose statuses only change on minute boundaries so re-running
     * sooner wastes work. */
    tickClock();
    render();
    setInterval(tickClock, 1000);
    setInterval(render, 30000);
  </script>
</body>
</html>
